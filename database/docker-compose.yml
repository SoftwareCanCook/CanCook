services:
  mariadb:
    image: mariadb:latest
    container_name: WSU_4310_DB_Design_CANCOOK
    restart: always
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=cancook
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    ports:
      - 3333:3306

volumes:
  mariadb_data:
